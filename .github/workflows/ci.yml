name: CI

on:
  push:
    branches: [main]
  pull_request:

# GitHub Actions will force Node.js 24 on June 16, 2026 and remove Node.js 20
# on September 16, 2026. Opt in now via FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
# and pin to action majors that already support Node.js 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: uv sync --extra dev
      - run: uv lock --check
      - run: uv run ruff check src tests scripts
      - run: uv run ruff format --check src tests scripts
      - run: uv run mypy src
      - run: uv run pytest -m "not e2e" -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        run: docker build -t mini-agent:ci .
